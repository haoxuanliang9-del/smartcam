system:
  device_id: "CAM-001"
  log_level: "info"
  log_file: "/home/orangepi/smartcam/app.log"
  log_max_size_mb: 5
  log_max_files: 3

camera:
  video_file: "/home/orangepi/video.mp4"
  bitrate_kbps: 1000

sensor:
  i2c_bus: 3
  i2c_addr: 0x38
  sample_interval_sec: 1

streaming:
  rtsp_port: 8554
  stream_name: "live"
  max_clients: 10
  audio_device: "plughw:CARD=Loopback,DEV=0"

osd:
  enabled: true
  font_size: 24

display:
  enabled: true
  spi_device: "/dev/spidev1.0"
  gpio_dc: 74
  gpio_rst: 78
  gpio_cs: 233
  refresh_sec: 1
