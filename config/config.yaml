system:
  device_id: "CAM-VM-001"
  log_level: "info"
  log_file: "/tmp/smartcam/app.log"
  log_max_size_mb: 5
  log_max_files: 3

camera:
  v4l2_device: "/dev/video0"
  v4l2_width: 1280
  v4l2_height: 720
  v4l2_fps: 10
  # YUYV 格式 1280x720@10fps，兼容性好，无需 MJPEG 硬件解码
  v4l2_pix_fmt: "yuyv422"
  bitrate_kbps: 2500

sensor:
  i2c_bus: 99
  i2c_addr: 0x38
  sample_interval_sec: 1

streaming:
  rtsp_port: 8554
  stream_name: "live"
  max_clients: 10
  audio_device: "default"
  audio_enabled: true
  audio_volume: 4.0

osd:
  enabled: false
  font_size: 24

display:
  enabled: false
  spi_device: "/dev/spidev0.0"
  gpio_dc: 14
  gpio_rst: 9
  gpio_cs: 10
  refresh_sec: 1
